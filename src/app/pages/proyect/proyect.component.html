<section class="container-projects">
    <section class="section-tecnologies">
        <h2>TECNOLOGIAS</h2>
        <div class="container-items">
            @for (tecnology of tecnologiesList; track $index) {
                <app-svg-tecnology [data]="tecnology" />
            }
        </div>
    </section>
    <section class="section-projects">
        @for (project of [1,2,3]; track $index) {
            <div class="item">
                <div class="container-img">
                    <img src="/" alt="project.title">
                </div>
                <h3>{{ "project.title" }}</h3>
                <p>{{ "project.description" }}</p>
                <div class="list-tecnologies">
                    <div class="img-tecnology">
                        <img src="/" alt="project.title">
                    </div>
                </div>
            </div>
        }
    </section>
</section>
